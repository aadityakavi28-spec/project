<!DOCTYPE html>

      @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(6, 182, 212, 0.4); } 50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(139, 92, 246, 0.5); } }
